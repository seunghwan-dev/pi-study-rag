# Secret scanning — pi-study-rag (Phase H, layer 2 of 3).
# Runs gitleaks on every push and pull request across the FULL history
# (fetch-depth: 0). Uses .gitleaks.toml in the repo root automatically.
name: secret-scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_CONFIG is auto-detected as .gitleaks.toml at repo root.
          # NOTE: gitleaks-action is free for personal/public repos. Only GitHub
          # *organization* accounts require a GITLEAKS_LICENSE secret.
