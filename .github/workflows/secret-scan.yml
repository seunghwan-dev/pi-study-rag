# Secret scanning — pi-study-rag (Phase H, layer 2 of 3).
# Runs gitleaks across the FULL history (--log-opts="--all") on every push and PR,
# using a pinned release binary. Independent of push-delta SHAs, so this stays
# green after a force-push / history rewrite. Uses .gitleaks.toml in the repo
# root automatically.
name: secret-scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (full history)
        run: gitleaks detect --source . --log-opts="--all" --redact --no-banner
