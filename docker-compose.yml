services:
  # ===== Vector Database (Oracle 26 AI) =====
  oracle-26ai:
    image: container-registry.oracle.com/database/free:latest
    environment:
      - ORACLE_PWD=${ORACLE_PWD}
    volumes:
      - oracle-data:/opt/oracle/oradata
    ports:
      - "1521:1521"
    mem_limit: 12g
    healthcheck:
      test: >
        CMD-SHELL echo 'SELECT 1 FROM DUAL;' |
        sqlplus -s ADMIN/$${ORACLE_PWD}@localhost/FREEPDB1
        | grep -q '1' || exit 1
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ===== Local LLM (Ollama with GPU) =====
  ollama:
    image: ollama/ollama:0.20.7
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ===== Embedding Server (e5-large) =====
  embedding:
    build: ./embedding
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_DOWNLOAD_TIMEOUT=300
      - HF_HUB_ETAG_TIMEOUT=120
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  # ===== Backend (FastAPI) =====
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ORACLE_DSN=PDBADMIN/${ORACLE_PWD}@oracle-26ai:1521/FREEPDB1
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_MODEL_FAST=${OLLAMA_MODEL_FAST}
      - OLLAMA_MODEL_SMART=${OLLAMA_MODEL_SMART}
      - EMBEDDING_HOST=http://embedding:8001
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - VLM_PROVIDER=${VLM_PROVIDER}
    depends_on:
      oracle-26ai:
        condition: service_healthy
      ollama:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  oracle-data:
  ollama-data:
  hf-cache:
